<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
  <style> body { margin: 0; overflow: hidden; } </style>
  
  <script>
    AFRAME.registerComponent('mindar-camera-fix', {
      tick: function () {
        var cam = this.el.sceneEl.camera;
        if (cam && cam.near !== 0.001) { 
          cam.near = 0.001; 
          cam.updateProjectionMatrix(); 
        }
      }
    });

    AFRAME.registerComponent('fix-model-clipping', {
      init: function () {
        this.el.addEventListener('model-loaded', () => {
          const obj = this.el.getObject3D('mesh');
          if (obj) {
            obj.traverse((node) => {
              if (node.isMesh) {
                node.frustumCulled = false;
                if (node.material) { 
                  node.material.side = THREE.DoubleSide; 
                  node.material.depthWrite = true; 
                }
              }
            });
          }
        });
      }
    });

    AFRAME.registerComponent('swipe-rotate', {
      init: function () {
        this.isDragging = false;
        this.previousX = 0;
        
        const onPointerDown = (e) => {
          this.isDragging = true;
          this.previousX = e.touches ? e.touches[0].screenX : e.clientX;
        };
        
        const onPointerUp = () => { this.isDragging = false; };
        
        const onPointerMove = (e) => {
          if (!this.isDragging) return;
          
          if (this.el.parentEl.object3D.visible) {
            const currentX = e.touches ? e.touches[0].screenX : e.clientX;
            const deltaX = currentX - this.previousX;
            
            this.el.object3D.rotation.y += deltaX * 0.01; 
            this.previousX = currentX;
          }
        };

        window.addEventListener('mousedown', onPointerDown);
        window.addEventListener('touchstart', onPointerDown);
        window.addEventListener('mouseup', onPointerUp);
        window.addEventListener('touchend', onPointerUp);
        window.addEventListener('mousemove', onPointerMove);
        window.addEventListener('touchmove', onPointerMove);
      }
    });
  </script>
</head>
<body>
  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; filterMinCF:0.0001; filterBeta: 0.001"
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; colorManagement: true;"
    mindar-camera-fix>
    
    <a-assets>
      <a-asset-item id="model_anim" src="./model_animation.glb"></a-asset-item>
      
      <a-asset-item id="packaging_1" src="./model_static_1.glb"></a-asset-item>
      <a-asset-item id="packaging_2" src="./model_static_2.glb"></a-asset-item>
      <a-asset-item id="packaging_3" src="./model_static_3.glb"></a-asset-item>
      <a-asset-item id="packaging_4" src="./model_static_4.glb"></a-asset-item>
    </a-assets>
    
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    
    <a-entity mindar-image-target="targetIndex: 0">
      <a-gltf-model fix-model-clipping src="#model_anim" position="0 -0.3 0" scale="0.5 0.5 0.5" animation-mixer="clip: *; loop: repeat"></a-gltf-model>
    </a-entity>
    
    <a-entity mindar-image-target="targetIndex: 1">
      <a-gltf-model fix-model-clipping src="#model_anim" position="0 -0.3 0" scale="0.5 0.5 0.5" animation-mixer="clip: *; loop: repeat"></a-gltf-model>
    </a-entity>
    
    <a-entity mindar-image-target="targetIndex: 2">
      <a-gltf-model fix-model-clipping src="#model_anim" position="0 -0.3 0" scale="0.5 0.5 0.5" animation-mixer="clip: *; loop: repeat"></a-gltf-model>
    </a-entity>

    <a-entity mindar-image-target="targetIndex: 3">
      <a-gltf-model fix-model-clipping swipe-rotate src="#packaging_1" position="0 0 0" scale="0.5 0.5 0.5"></a-gltf-model>
    </a-entity>

    <a-entity mindar-image-target="targetIndex: 4">
      <a-gltf-model fix-model-clipping swipe-rotate src="#packaging_2" position="0 0 0" scale="0.5 0.5 0.5"></a-gltf-model>
    </a-entity>

    <a-entity mindar-image-target="targetIndex: 5">
      <a-gltf-model fix-model-clipping swipe-rotate src="#packaging_3" position="0 0 0" scale="0.5 0.5 0.5"></a-gltf-model>
    </a-entity>

    <a-entity mindar-image-target="targetIndex: 6">
      <a-gltf-model fix-model-clipping swipe-rotate src="#packaging_4" position="0 0 0" scale="0.5 0.5 0.5"></a-gltf-model>
    </a-entity>

  </a-scene>
</body>
</html>
